name: listen
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - ffmpeg          # required by Whisper for audio decoding
  - pip:
    - torch>=2.1.0
    - torchaudio>=2.1.0
    - openai-whisper>=20231117
    - spacy>=3.7.0
    - pydantic>=2.0.0
    - pyyaml>=6.0
    - tqdm>=4.66.0
    - click>=8.1.0
    - pytest>=7.4.0
    - pytest-cov>=4.1.0
    - jupyter>=1.0.0
    - ipykernel>=6.25.0
